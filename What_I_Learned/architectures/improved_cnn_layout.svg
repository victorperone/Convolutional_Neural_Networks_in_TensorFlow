<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 2700" width="100%" height="2700">

<style>
.layer {fill:#F8F9FA; stroke:#333; stroke-width:2}
.input {fill:#E3F2FD; stroke:#1E88E5; stroke-width:2}
.conv {fill:#E8F5E9; stroke:#2E7D32; stroke-width:2}
.pool {fill:#FFF3E0; stroke:#EF6C00; stroke-width:2}
.dense {fill:#FCE4EC; stroke:#C2185B; stroke-width:2}
.augment {fill:#E0F7FA; stroke:#00838F; stroke-width:2}
.noise {fill:#FFF9C4; stroke:#F9A825; stroke-width:2}
.norm {fill:#EDE7F6; stroke:#5E35B1; stroke-width:2}
.dropout {fill:#FFF8E1; stroke:#F9A825; stroke-width:2}
.arrow {stroke:#444; stroke-width:2; marker-end:url(#arrow)}
text {font-family:Arial; font-size:14px}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#444"/>
</marker>
</defs>

<!-- Input -->
<rect class="input" x="150" y="20" width="300" height="60"/>
<text x="300" y="55" text-anchor="middle">Input (150×150×3)</text>

<line class="arrow" x1="300" y1="80" x2="300" y2="120"/>

<!-- Augmentation -->
<rect class="augment" x="150" y="120" width="300" height="60"/>
<text x="300" y="155" text-anchor="middle">Data Augmentation</text>

<line class="arrow" x1="300" y1="180" x2="300" y2="220"/>

<rect class="augment" x="150" y="220" width="300" height="60"/>
<text x="300" y="255" text-anchor="middle">Rescaling (1./255)</text>

<line class="arrow" x1="300" y1="280" x2="300" y2="320"/>

<rect class="noise" x="150" y="320" width="300" height="60"/>
<text x="300" y="355" text-anchor="middle">GaussianNoise (0.05)</text>

<line class="arrow" x1="300" y1="380" x2="300" y2="420"/>

<!-- Conv Block 1 -->
<rect class="conv" x="150" y="420" width="300" height="60"/>
<text x="300" y="455" text-anchor="middle">Conv2D 32 • 3×3</text>

<line class="arrow" x1="300" y1="480" x2="300" y2="520"/>

<rect class="norm" x="150" y="520" width="300" height="60"/>
<text x="300" y="555" text-anchor="middle">BatchNormalization</text>

<line class="arrow" x1="300" y1="580" x2="300" y2="620"/>

<rect class="layer" x="150" y="620" width="300" height="60"/>
<text x="300" y="655" text-anchor="middle">ReLU</text>

<line class="arrow" x1="300" y1="680" x2="300" y2="720"/>

<rect class="conv" x="150" y="720" width="300" height="60"/>
<text x="300" y="755" text-anchor="middle">Conv2D 32 • 3×3</text>

<line class="arrow" x1="300" y1="780" x2="300" y2="820"/>

<rect class="norm" x="150" y="820" width="300" height="60"/>
<text x="300" y="855" text-anchor="middle">BatchNormalization</text>

<line class="arrow" x1="300" y1="880" x2="300" y2="920"/>

<rect class="layer" x="150" y="920" width="300" height="60"/>
<text x="300" y="955" text-anchor="middle">ReLU</text>

<line class="arrow" x1="300" y1="980" x2="300" y2="1020"/>

<rect class="pool" x="150" y="1020" width="300" height="60"/>
<text x="300" y="1055" text-anchor="middle">MaxPooling2D (2×2)</text>

<line class="arrow" x1="300" y1="1080" x2="300" y2="1120"/>

<rect class="dropout" x="150" y="1120" width="300" height="60"/>
<text x="300" y="1155" text-anchor="middle">Dropout (0.25)</text>

<!-- Conv Block 2 -->
<line class="arrow" x1="300" y1="1180" x2="300" y2="1220"/>

<rect class="conv" x="150" y="1220" width="300" height="60"/>
<text x="300" y="1255" text-anchor="middle">Conv2D 64 • 3×3</text>

<line class="arrow" x1="300" y1="1280" x2="300" y2="1320"/>

<rect class="norm" x="150" y="1320" width="300" height="60"/>
<text x="300" y="1355" text-anchor="middle">BatchNormalization</text>

<line class="arrow" x1="300" y1="1380" x2="300" y2="1420"/>

<rect class="layer" x="150" y="1420" width="300" height="60"/>
<text x="300" y="1455" text-anchor="middle">ReLU</text>

<line class="arrow" x1="300" y1="1480" x2="300" y2="1520"/>

<rect class="conv" x="150" y="1520" width="300" height="60"/>
<text x="300" y="1555" text-anchor="middle">Conv2D 64 • 3×3</text>

<line class="arrow" x1="300" y1="1580" x2="300" y2="1620"/>

<rect class="norm" x="150" y="1620" width="300" height="60"/>
<text x="300" y="1655" text-anchor="middle">BatchNormalization</text>

<line class="arrow" x1="300" y1="1680" x2="300" y2="1720"/>

<rect class="layer" x="150" y="1720" width="300" height="60"/>
<text x="300" y="1755" text-anchor="middle">ReLU</text>

<line class="arrow" x1="300" y1="1780" x2="300" y2="1820"/>

<rect class="pool" x="150" y="1820" width="300" height="60"/>
<text x="300" y="1855" text-anchor="middle">MaxPooling2D (2×2)</text>

<line class="arrow" x1="300" y1="1880" x2="300" y2="1920"/>

<rect class="dropout" x="150" y="1920" width="300" height="60"/>
<text x="300" y="1955" text-anchor="middle">Dropout (0.25)</text>

<!-- Classifier -->
<line class="arrow" x1="300" y1="1980" x2="300" y2="2020"/>

<rect class="layer" x="150" y="2020" width="300" height="60"/>
<text x="300" y="2055" text-anchor="middle">Flatten</text>

<line class="arrow" x1="300" y1="2080" x2="300" y2="2120"/>

<!-- Dense 256 -->
<rect class="dense" x="150" y="2120" width="300" height="60"/>
<text x="300" y="2155" text-anchor="middle">Dense 256</text>

<line class="arrow" x1="300" y1="2180" x2="300" y2="2220"/>

<!-- BatchNorm -->
<rect class="norm" x="150" y="2220" width="300" height="60"/>
<text x="300" y="2255" text-anchor="middle">BatchNormalization</text>

<line class="arrow" x1="300" y1="2280" x2="300" y2="2320"/>

<!-- ReLU -->
<rect class="layer" x="150" y="2320" width="300" height="60"/>
<text x="300" y="2355" text-anchor="middle">ReLU</text>

<line class="arrow" x1="300" y1="2380" x2="300" y2="2420"/>

<!-- Dropout -->
<rect class="dropout" x="150" y="2420" width="300" height="60"/>
<text x="300" y="2455" text-anchor="middle">Dropout (0.5)</text>

<line class="arrow" x1="300" y1="2480" x2="300" y2="2520"/>

<!-- Output -->
<rect class="dense" x="150" y="2520" width="300" height="70"/>
<text x="300" y="2550" text-anchor="middle">Dense</text>
<text x="300" y="2570" text-anchor="middle">6 classes • Softmax</text>

</svg>
