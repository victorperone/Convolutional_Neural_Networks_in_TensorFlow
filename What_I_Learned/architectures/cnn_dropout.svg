<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 980" width="100%" height="980">

<style>
.layer {fill:#F8F9FA; stroke:#333; stroke-width:2}
.input {fill:#E3F2FD; stroke:#1E88E5; stroke-width:2}
.conv {fill:#E8F5E9; stroke:#2E7D32; stroke-width:2}
.pool {fill:#FFF3E0; stroke:#EF6C00; stroke-width:2}
.dense {fill:#FCE4EC; stroke:#C2185B; stroke-width:2}
.dropout {fill:#FFF9C4; stroke:#F9A825; stroke-width:2}
.arrow {stroke:#444; stroke-width:2; marker-end:url(#arrow)}
text {font-family:Arial; font-size:14px}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#444"/>
</marker>
</defs>

<!-- Input -->
<rect class="input" x="150" y="20" width="300" height="60"/>
<text x="300" y="55" text-anchor="middle">Input (150×150×3)</text>

<line class="arrow" x1="300" y1="80" x2="300" y2="120"/>

<!-- Conv1 -->
<rect class="conv" x="150" y="120" width="300" height="70"/>
<text x="300" y="150" text-anchor="middle">Conv2D</text>
<text x="300" y="170" text-anchor="middle">32 filters • 3×3 • ReLU</text>

<line class="arrow" x1="300" y1="190" x2="300" y2="230"/>

<!-- Pool1 -->
<rect class="pool" x="150" y="230" width="300" height="60"/>
<text x="300" y="265" text-anchor="middle">MaxPooling2D (2×2)</text>

<line class="arrow" x1="300" y1="290" x2="300" y2="330"/>

<!-- Conv2 -->
<rect class="conv" x="150" y="330" width="300" height="70"/>
<text x="300" y="360" text-anchor="middle">Conv2D</text>
<text x="300" y="380" text-anchor="middle">64 filters • 3×3 • ReLU</text>

<line class="arrow" x1="300" y1="400" x2="300" y2="440"/>

<!-- Pool2 -->
<rect class="pool" x="150" y="440" width="300" height="60"/>
<text x="300" y="475" text-anchor="middle">MaxPooling2D (2×2)</text>

<line class="arrow" x1="300" y1="500" x2="300" y2="540"/>

<!-- Flatten -->
<rect class="layer" x="150" y="540" width="300" height="60"/>
<text x="300" y="575" text-anchor="middle">Flatten</text>

<line class="arrow" x1="300" y1="600" x2="300" y2="640"/>

<!-- Dense -->
<rect class="dense" x="150" y="640" width="300" height="70"/>
<text x="300" y="670" text-anchor="middle">Dense</text>
<text x="300" y="690" text-anchor="middle">128 units • ReLU</text>

<line class="arrow" x1="300" y1="710" x2="300" y2="750"/>

<!-- Dropout -->
<rect class="dropout" x="150" y="750" width="300" height="60"/>
<text x="300" y="785" text-anchor="middle">Dropout (0.5)</text>

<line class="arrow" x1="300" y1="810" x2="300" y2="850"/>

<!-- Output -->
<rect class="dense" x="150" y="850" width="300" height="70"/>
<text x="300" y="880" text-anchor="middle">Dense</text>
<text x="300" y="900" text-anchor="middle">6 classes • Softmax</text>

</svg>
